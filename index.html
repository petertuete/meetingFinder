<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anonymer Meeting-Zeitfinder</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap");

      :root {
        --bg-1: #f7f5ef;
        --bg-2: #e9e2d4;
        --card: #fffdf8;
        --ink: #1e2937;
        --ink-soft: #566170;
        --line: #d8cfbf;
        --accent: #0b7285;
        --shadow: 0 14px 35px rgba(30, 41, 55, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(840px 450px at 6% -14%, #d8edf8 0, transparent 64%),
          radial-gradient(750px 400px at 100% 0%, #f6dbc7 0, transparent 58%),
          linear-gradient(165deg, var(--bg-1), var(--bg-2));
      }

      .wrap {
        width: min(1200px, calc(100% - 1.2rem));
        margin: 1.2rem auto 2.3rem;
      }

      .hero,
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 1rem 1.1rem;
        margin-bottom: 0.8rem;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.28rem, 1rem + 1.35vw, 1.95rem);
      }

      .subtitle {
        margin: 0.42rem 0 0;
        color: var(--ink-soft);
      }

      .grid {
        display: grid;
        grid-template-columns: 1.45fr 0.95fr;
        gap: 0.8rem;
      }

      .card {
        padding: 0.92rem;
      }

      .card h2 {
        margin: 0 0 0.65rem;
        font-size: 1.05rem;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        align-items: center;
        margin-bottom: 0.7rem;
      }

      .chip {
        background: #eef4f7;
        border: 1px solid #d5e3ea;
        color: #244155;
        border-radius: 999px;
        padding: 0.35rem 0.7rem;
        font-size: 0.88rem;
      }

      button,
      select {
        font: inherit;
      }

      select,
      button {
        border-radius: 10px;
        border: 1px solid #c7d4dd;
        padding: 0.48rem 0.62rem;
        background: #fff;
      }

      button {
        cursor: pointer;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }

      .btn-soft {
        background: #ebf1f5;
        color: #2a4255;
      }

      .week-board {
        overflow: auto;
        border: 1px solid #d8e2e9;
        border-radius: 12px;
        background: #fff;
      }

      .week-header,
      .week-row {
        display: grid;
        grid-template-columns: 72px repeat(7, minmax(70px, 1fr));
      }

      .week-header {
        position: sticky;
        top: 0;
        z-index: 2;
      }

      .cell,
      .time-label,
      .day-label {
        border-right: 1px solid #e5edf2;
        border-bottom: 1px solid #e5edf2;
      }

      .day-label {
        background: #f3f7fa;
        text-align: center;
        padding: 0.5rem 0.25rem;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .time-label {
        background: #f8fbfd;
        text-align: center;
        font-size: 0.74rem;
        color: var(--ink-soft);
        padding-top: 0.4rem;
      }

      .cell {
        position: relative;
        height: 24px;
        touch-action: none;
        cursor: crosshair;
      }

      .cell::before {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 4px;
        background: rgba(11, 114, 133, var(--heat, 0));
      }

      .cell.mine::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 4px;
        border: 2px solid rgba(11, 114, 133, 0.95);
        background: repeating-linear-gradient(
          -45deg,
          rgba(11, 114, 133, 0.15) 0,
          rgba(11, 114, 133, 0.15) 4px,
          rgba(11, 114, 133, 0.26) 4px,
          rgba(11, 114, 133, 0.26) 8px
        );
      }

      .results-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 0.5rem;
      }

      .results-item {
        border: 1px solid #dce7ee;
        border-left: 5px solid var(--accent);
        border-radius: 11px;
        padding: 0.54rem 0.6rem;
      }

      .mono {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
      }

      .hint,
      .empty,
      .stats {
        color: var(--ink-soft);
      }

      .hint,
      .stats {
        margin: 0.45rem 0 0;
        font-size: 0.89rem;
      }

      .empty {
        font-style: italic;
      }

      @media (max-width: 980px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .week-header,
        .week-row {
          grid-template-columns: 62px repeat(7, minmax(62px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <h1>Anonymer Meeting-Zeitfinder</h1>
        <p class="subtitle">Jede Person markiert in der Wochenansicht direkt per Maus oder Finger ihre Verfügbarkeit.</p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Wochenansicht</h2>
          <div class="toolbar">
            <span id="participant-count" class="chip">Teilnehmer: 0</span>
            <label for="participant-select">Aktive Person:</label>
            <select id="participant-select"></select>
            <button id="add-participant" class="btn-primary" type="button">Nächste anonyme Person</button>
            <button id="clear-current" class="btn-soft" type="button">Aktive Person löschen</button>
            <button id="clear-all" class="btn-soft" type="button">Alles löschen</button>
          </div>

          <div id="week-board" class="week-board"></div>
          <p class="hint">Tippen oder klicken und ziehen: markiert Verfügbarkeit. Nochmals ziehen: entfernt Markierung.</p>
        </article>

        <article class="card">
          <h2>Beste Termine</h2>
          <div class="toolbar">
            <label for="duration">Dauer:</label>
            <select id="duration">
              <option value="30">30 min</option>
              <option value="60" selected>60 min</option>
              <option value="90">90 min</option>
              <option value="120">120 min</option>
            </select>

            <label for="top">Vorschläge:</label>
            <select id="top">
              <option value="3">Top 3</option>
              <option value="5" selected>Top 5</option>
              <option value="10">Top 10</option>
            </select>

            <button id="calc" class="btn-primary" type="button">Berechnen</button>
          </div>

          <ul id="results" class="results-list"></ul>
          <p id="results-empty" class="empty">Noch keine Berechnung gestartet.</p>
          <p id="stats" class="stats"></p>
        </article>
      </section>
    </main>

    <script>
      const dayLabels = ["Montag", "Dienstag", "Mittwoch", "Donnerstag", "Freitag", "Samstag", "Sonntag"];
      const slotStep = 30;
      const dayStart = 6 * 60;
      const dayEnd = 22 * 60;
      const slotsPerDay = (dayEnd - dayStart) / slotStep;

      const board = document.getElementById("week-board");
      const participantSelect = document.getElementById("participant-select");
      const participantCount = document.getElementById("participant-count");
      const durationSelect = document.getElementById("duration");
      const topSelect = document.getElementById("top");
      const resultsList = document.getElementById("results");
      const resultsEmpty = document.getElementById("results-empty");
      const stats = document.getElementById("stats");

      const participants = [];
      let activeId = null;
      let isPainting = false;
      let paintMode = "add";

      function toClock(minutes) {
        const h = String(Math.floor(minutes / 60)).padStart(2, "0");
        const m = String(minutes % 60).padStart(2, "0");
        return `${h}:${m}`;
      }

      function keyFor(dayIndex, slotIndex) {
        return `${dayIndex}-${slotIndex}`;
      }

      function getActive() {
        return participants.find((p) => p.id === activeId) || null;
      }

      function addParticipant() {
        const id = crypto.randomUUID();
        const label = `Person ${participants.length + 1}`;
        participants.push({ id, label, slots: new Set() });
        activeId = id;
        renderParticipantSelect();
        paintBoard();
        clearResults("Neue Person angelegt. Verfügbarkeit direkt im Raster markieren.");
      }

      function renderParticipantSelect() {
        participantSelect.innerHTML = "";
        participants.forEach((p) => {
          const option = document.createElement("option");
          option.value = p.id;
          option.textContent = p.label;
          participantSelect.appendChild(option);
        });

        if (activeId) {
          participantSelect.value = activeId;
        }

        participantCount.textContent = `Teilnehmer: ${participants.length}`;
      }

      function buildBoard() {
        const header = document.createElement("div");
        header.className = "week-header";

        const spacer = document.createElement("div");
        spacer.className = "day-label";
        spacer.textContent = "Zeit";
        header.appendChild(spacer);

        dayLabels.forEach((label) => {
          const d = document.createElement("div");
          d.className = "day-label";
          d.textContent = label;
          header.appendChild(d);
        });
        board.appendChild(header);

        for (let slot = 0; slot < slotsPerDay; slot += 1) {
          const row = document.createElement("div");
          row.className = "week-row";

          const time = document.createElement("div");
          time.className = "time-label mono";
          time.textContent = toClock(dayStart + slot * slotStep);
          row.appendChild(time);

          for (let day = 0; day < 7; day += 1) {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.dataset.day = String(day);
            cell.dataset.slot = String(slot);
            row.appendChild(cell);
          }

          board.appendChild(row);
        }

        board.addEventListener("pointerdown", handlePointerDown);
        board.addEventListener("pointermove", handlePointerMove);
        window.addEventListener("pointerup", handlePointerUp);
      }

      function availabilityCount(dayIndex, slotIndex) {
        const key = keyFor(dayIndex, slotIndex);
        return participants.filter((p) => p.slots.has(key)).length;
      }

      function paintBoard() {
        const active = getActive();
        const max = Math.max(participants.length, 1);

        board.querySelectorAll(".cell").forEach((cell) => {
          const dayIndex = Number(cell.dataset.day);
          const slotIndex = Number(cell.dataset.slot);
          const key = keyFor(dayIndex, slotIndex);
          const count = availabilityCount(dayIndex, slotIndex);
          const intensity = count / max;

          cell.style.setProperty("--heat", String(0.12 + intensity * 0.42));
          if (active && active.slots.has(key)) {
            cell.classList.add("mine");
          } else {
            cell.classList.remove("mine");
          }
        });
      }

      function setCell(dayIndex, slotIndex) {
        const active = getActive();
        if (!active) return;

        const key = keyFor(dayIndex, slotIndex);
        if (paintMode === "add") active.slots.add(key);
        if (paintMode === "remove") active.slots.delete(key);
      }

      function isCellElement(target) {
        return target instanceof HTMLElement && target.classList.contains("cell");
      }

      function handlePointerDown(event) {
        if (!isCellElement(event.target)) return;
        if (!getActive()) return;

        event.preventDefault();
        const dayIndex = Number(event.target.dataset.day);
        const slotIndex = Number(event.target.dataset.slot);
        const active = getActive();
        const key = keyFor(dayIndex, slotIndex);

        paintMode = active.slots.has(key) ? "remove" : "add";
        isPainting = true;
        setCell(dayIndex, slotIndex);
        paintBoard();
        clearResults("Verfügbarkeit geändert. Für neue Vorschläge bitte berechnen.");
      }

      function handlePointerMove(event) {
        if (!isPainting) return;
        const elem = document.elementFromPoint(event.clientX, event.clientY);
        if (!isCellElement(elem)) return;

        const dayIndex = Number(elem.dataset.day);
        const slotIndex = Number(elem.dataset.slot);
        setCell(dayIndex, slotIndex);
        paintBoard();
      }

      function handlePointerUp() {
        isPainting = false;
      }

      function clearResults(message) {
        resultsList.innerHTML = "";
        resultsEmpty.textContent = message || "Noch keine Berechnung gestartet.";
        resultsEmpty.style.display = "block";
        stats.textContent = "";
      }

      function availableForWindow(participant, dayIndex, startSlot, slotsNeeded) {
        for (let i = 0; i < slotsNeeded; i += 1) {
          const key = keyFor(dayIndex, startSlot + i);
          if (!participant.slots.has(key)) return false;
        }
        return true;
      }

      function calculate() {
        const duration = Number(durationSelect.value);
        const topN = Number(topSelect.value);
        const slotsNeeded = duration / slotStep;

        if (!participants.length) {
          clearResults("Bitte zuerst mindestens eine anonyme Person anlegen.");
          return;
        }

        const withEntries = participants.filter((p) => p.slots.size > 0);
        if (!withEntries.length) {
          clearResults("Es gibt noch keine markierten Verfügbarkeiten.");
          return;
        }

        const candidates = [];

        for (let day = 0; day < 7; day += 1) {
          for (let startSlot = 0; startSlot + slotsNeeded <= slotsPerDay; startSlot += 1) {
            const available = withEntries.filter((p) => availableForWindow(p, day, startSlot, slotsNeeded));
            candidates.push({
              day,
              startSlot,
              endSlot: startSlot + slotsNeeded,
              score: available.length,
            });
          }
        }

        candidates.sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          if (a.day !== b.day) return a.day - b.day;
          return a.startSlot - b.startSlot;
        });

        const top = candidates.filter((c) => c.score > 0).slice(0, topN);

        resultsList.innerHTML = "";
        if (!top.length) {
          clearResults("Keine überlappenden Verfügbarkeiten für diese Dauer gefunden.");
          return;
        }

        top.forEach((item, index) => {
          const li = document.createElement("li");
          li.className = "results-item";
          const startMin = dayStart + item.startSlot * slotStep;
          const endMin = dayStart + item.endSlot * slotStep;
          const pct = Math.round((item.score / withEntries.length) * 100);

          li.innerHTML = `<strong>#${index + 1}: ${dayLabels[item.day]} <span class="mono">${toClock(startMin)} - ${toClock(endMin)}</span></strong>
            <span>${item.score} von ${withEntries.length} aktiven Personen verfügbar (${pct}%).</span>`;
          resultsList.appendChild(li);
        });

        resultsEmpty.style.display = "none";
        stats.textContent = `${withEntries.length} aktive Personen, Dauer ${duration} Minuten, Raster 30 Minuten.`;
      }

      participantSelect.addEventListener("change", (event) => {
        activeId = event.target.value;
        paintBoard();
      });

      document.getElementById("add-participant").addEventListener("click", addParticipant);

      document.getElementById("clear-current").addEventListener("click", () => {
        const active = getActive();
        if (!active) return;
        active.slots.clear();
        paintBoard();
        clearResults("Markierungen der aktiven Person wurden entfernt.");
      });

      document.getElementById("clear-all").addEventListener("click", () => {
        participants.length = 0;
        activeId = null;
        renderParticipantSelect();
        paintBoard();
        clearResults("Alle anonymen Teilnehmer und Markierungen wurden gelöscht.");
      });

      document.getElementById("calc").addEventListener("click", calculate);

      buildBoard();
      addParticipant();
    </script>
  </body>
</html>
